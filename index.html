<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>골든볼 미니게임</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --mint: #2EE6B0;
  --mint-deep: #14B894;
  --mint-dim: #0c2f28;
  --bg-dark: #071512;
}
/* iOS Safari: position:fixed on body causes white screen — use height:100% instead */
html {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-dark);
}
body {
  font-family: sans-serif;
  background: var(--bg-dark);
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  width: 100%;
  height: 100%;
  /* iOS safe area */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

#s-intro {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 45%, var(--mint-dim), var(--bg-dark) 72%);
  display: none;           /* 기본 숨김 */
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  padding: 30px;
  -webkit-tap-highlight-color: transparent;
  overflow-y: auto;
}
#s-intro.on { display: flex; }
.big-ball { font-size: 56px; }
.t1 { font-size: 32px; font-weight: 900; color: var(--mint);
  text-shadow: 3px 3px 0 #000; line-height: 1.2; }
.t2 { font-size: 17px; font-weight: 700; color: #eafff7; line-height: 1.7; }
.t2 b { color: var(--mint); }
.badge { background: var(--mint); color: #042620; font-weight: 800;
  padding: 5px 18px; border-radius: 20px; font-size: 13px; }
.sub { color: #9be8cf; font-size: 13px; line-height: 1.8; }

.nick-wrap { display:flex; flex-direction:column; gap:8px; width:100%; max-width:300px; margin-top:4px; }
.nick-lbl { font-size:13px; color:#9be8cf; font-weight:700; text-align:left; padding-left:4px; }
#nick-input {
  width: 100%; padding: 14px 16px; border-radius: 14px; border: 2px solid var(--mint-deep);
  background: rgba(255,255,255,0.06); color: #fff; font-size: 17px; font-weight: 700;
  text-align: center; outline: none; -webkit-appearance: none;
}
#nick-input::placeholder { color: rgba(255,255,255,0.35); }
#nick-input:focus { border-color: var(--mint); }

.btn-go { background: var(--mint); color: #042620; border: none;
  padding: 16px 52px; font-weight: 900; font-size: 20px;
  border-radius: 50px; cursor: pointer; -webkit-appearance: none;
  box-shadow: 0 5px 0 var(--mint-deep); margin-top: 4px; }
.btn-go:disabled { opacity: 0.4; box-shadow: 0 5px 0 rgba(255,255,255,0.15); cursor: default; }

#s-game {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: none;
  flex-direction: column;
  -webkit-tap-highlight-color: transparent;
}
#s-game.on { display: flex; }

.hud {
  background: rgba(0,0,0,0.5);
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  gap: 10px;
}
.hud-nick { font-size: 13px; font-weight: 800; color: #9be8cf; max-width: 90px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hud-score { font-size: 20px; font-weight: 900; color: var(--mint); }
.hud-timer { font-size: 20px; font-weight: 900; color: #fff;
  background: rgba(46,230,176,0.15); border: 2px solid var(--mint);
  padding: 3px 14px; border-radius: 20px; min-width: 64px; text-align:center; }
.hud-timer.warn { color: #ff6b6b; border-color: #ff6b6b; background: rgba(255,107,107,0.15); }

.field {
  flex: 1;
  position: relative;
  background: linear-gradient(to bottom,
    #4a9fd4 0%, #87ceeb 11%,
    #1ea877 11%, #138a5f 35%, #0c6e4b 100%);
  overflow: hidden;
  touch-action: none;   /* 드래그 슛 인터랙션 유지 */
  -webkit-tap-highlight-color: transparent;
}

#goal-wrap {
  position: absolute;
  top: 6%;
  left: 50%;
  transform: translateX(-50%);
  width: 76%;
}
#goal-frame {
  width: 100%;
  padding-top: 45%;
  position: relative;
}
#goal-inner {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
}
.net {
  position: absolute;
  left: 5%; top: 10%; width: 90%; height: 90%;
  background-color: rgba(0,25,0,0.4);
  background-image:
    repeating-linear-gradient(90deg, rgba(255,255,255,0.13) 0 1px, transparent 1px 13%),
    repeating-linear-gradient(0deg,  rgba(255,255,255,0.13) 0 1px, transparent 1px 22%);
}
.gp { position: absolute; background: #f0f0f0; border-radius: 3px; }
.gp-l  { left:0; top:0; width:5%; height:100%; }
.gp-r  { right:0; top:0; width:5%; height:100%; }
.gp-t  { left:0; top:0; width:100%; height:10%; }

#keeper {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 22%;
  height: 96%;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: sway 2s ease-in-out infinite;
  overflow: visible;
  z-index: 3;
}
@keyframes sway { 0%,100%{margin-left:-5%} 50%{margin-left:5%} }

#keeper img {
  display: none;
  height: 100%;
  width: auto;
  object-fit: contain;
  pointer-events: none;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
}
#img-center { display: block; }

#keeper-fallback {
  display: none;
  align-items: flex-end;
  justify-content: center;
  height: 100%;
  width: 100%;
  font-size: 80px;
  line-height: 1;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
}

/* 다이브 시 이미지 크기 동일 유지, 위치는 JS로 제어 */
#keeper.dl, #keeper.dr { animation: none; }
#keeper.dc { animation: none; }

#ball {
  position: absolute;
  bottom: 6%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 42px;
  cursor: pointer;
  z-index: 10;
  filter: drop-shadow(0 3px 4px rgba(0,0,0,0.5));
  line-height: 1;
  -webkit-tap-highlight-color: transparent;
}
/* 골든볼: 이모지 대신 CSS로 그린 금빛 축구공 (오각형 패턴 + 골드 그라데이션) */
/* 골든볼: ⚽ 이모지의 형태(오각형 패턴)는 그대로 두고 색상 필터로 금색으로 물들임 */
#ball.golden {
  filter:
    drop-shadow(0 0 10px #ffd700) drop-shadow(0 0 20px #ffae00) drop-shadow(0 0 30px #ffae00)
    drop-shadow(0 3px 4px rgba(0,0,0,0.5));
  animation: golden-pulse 0.6s ease-in-out infinite;
}
/* 골든볼 등장 시 화면 테두리를 금색으로 강조 */
.field.golden-active {
  animation: field-golden-glow 0.8s ease-in-out infinite;
}
@keyframes field-golden-glow {
  0%,100% { box-shadow: inset 0 0 22px 6px rgba(255,215,0,0.55); }
  50%     { box-shadow: inset 0 0 38px 12px rgba(255,193,7,0.85); }
}
@keyframes golden-pulse {
  0%,100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.15); }
}

#acvs { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:5; }

#pw { position:absolute; bottom:2%; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:3px;
  pointer-events:none; opacity:0; }
#pw-lbl { font-size:11px; color:#eee; font-weight:700; letter-spacing:1px; }
#pw-bar { width:110px; height:9px; background:rgba(0,0,0,0.4); border-radius:5px;
  border:1.5px solid rgba(255,255,255,0.3); overflow:hidden; }
#pw-fill { height:100%; width:0%; border-radius:5px;
  background:linear-gradient(90deg,var(--mint),#f5e018,#e63946); }

#msg { position:absolute; bottom:19%; left:50%; transform:translateX(-50%);
  font-size:16px; font-weight:900; color:#fff;
  text-shadow:1px 1px 4px #000; white-space:nowrap; pointer-events:none; z-index:6; }

#flash { position:absolute; bottom:14%; left:50%; transform:translateX(-50%);
  font-size:50px; font-weight:900;
  pointer-events:none; opacity:0; z-index:20;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
  white-space: nowrap;
  transition: opacity 0.15s; }

.ground { height:50px; background:linear-gradient(#0e7a52,#0a4f35);
  position:relative; flex-shrink:0; }
.ps { width:9px; height:9px; background:rgba(255,255,255,0.5); border-radius:50%;
  position:absolute; top:28%; left:50%; transform:translateX(-50%); }
.pl { position:absolute; top:0; left:8%; width:84%; height:2.5px;
  background:rgba(255,255,255,0.35); border-radius:2px; }

#s-result {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 14px;
  text-align: center;
  padding: 28px 22px 36px;
  overflow-y: auto;
  -webkit-tap-highlight-color: transparent;
  background: radial-gradient(ellipse at 50% 30%, var(--mint-dim), var(--bg-dark) 75%);
}
#s-result.on { display: flex; }
.ri { font-size:70px; }
.rt { font-size:34px; font-weight:900; line-height:1.1; color: var(--mint); }
.rs { font-size:42px; font-weight:900; color:#fff; text-shadow:2px 2px 0 #000; }
.rsub { font-size:14px; color:#9be8cf; line-height:1.7; }

.rank-box { width:100%; max-width:340px; background:rgba(255,255,255,0.05);
  border:1.5px solid rgba(46,230,176,0.3); border-radius:16px; padding:14px;
  display:flex; flex-direction:column; gap:6px; margin-top:6px; }
.rank-title { font-size:13px; font-weight:800; color:var(--mint); margin-bottom:4px; letter-spacing:1px; }
.rank-row { display:flex; align-items:center; gap:8px; font-size:14px; padding:5px 6px; border-radius:8px; }
.rank-row.me { background:rgba(46,230,176,0.18); font-weight:900; }
.rank-rank { width:26px; font-weight:900; color:#9be8cf; }
.rank-name { flex:1; text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rank-score { font-weight:900; color:var(--mint); }
.rank-empty { font-size:13px; color:rgba(255,255,255,0.4); padding:8px 0; }
.rank-myrow-sep { font-size:11px; color:rgba(255,255,255,0.3); text-align:center; }

.btn-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
.btn2 { background:transparent; color:#fff; border:2px solid rgba(255,255,255,0.4);
  padding:13px 30px; border-radius:50px; font-size:15px; font-weight:700;
  cursor:pointer; -webkit-appearance:none; }
.btn-mint { background: var(--mint); color:#042620; border:2px solid var(--mint);
  padding:13px 30px; border-radius:50px; font-size:15px; font-weight:800;
  cursor:pointer; -webkit-appearance:none; }

#cwrap { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:999; overflow:hidden; }
.c { position:absolute; top:-10px; border-radius:2px; opacity:0; animation:fall linear forwards; }
@keyframes fall { 0%{opacity:1;transform:translateY(0) rotate(0)} 100%{opacity:.1;transform:translateY(110vh) rotate(720deg)} }
</style>
</head>
<body>

<div id="s-intro" class="on">
  <div class="big-ball">⚽</div>
  <div class="t1">골든볼 미니게임</div>
  <div class="t2">수상할정도로 축구에<br>진심인 소가 있다?!</div>
  <div class="t2"><b>무자비하게 다 막아버리는</b><br><b>바우키퍼</b>를 뚫어보세요 ⚽</div>
  <div class="badge">20초 동안 최대한 많이 골인!</div>
  <div class="sub">공을 드래그해서<br>방향과 세기를 정하세요</div>
  <div class="nick-wrap">
    <div class="nick-lbl">이름</div>
    <input id="nick-input" type="text" maxlength="10" placeholder="랭킹에 표시될 이름" />
  </div>
  <button class="btn-go" id="btn-start" onclick="startGame()" disabled>게임 시작</button>
</div>

<div id="s-game">
  <div class="hud">
    <div class="hud-nick" id="hud-nick"></div>
    <div class="hud-timer" id="hud-timer">30</div>
    <div class="hud-score">⚽ <span id="sv">0</span></div>
  </div>
  <div class="field" id="field">
    <div id="goal-wrap">
      <div id="goal-frame">
        <div id="goal-inner">
          <div class="net"></div>
          <div class="gp gp-l"></div>
          <div class="gp gp-r"></div>
          <div class="gp gp-t"></div>

          <!-- 골키퍼 이미지 캐릭터 -->
          <div id="keeper">
            <img id="img-center"  src="keeper_center.png"  alt="keeper center"/>
            <img id="img-dive-l"  src="keeper_dive_l.png"  alt="keeper dive left"/>
            <img id="img-dive-r"  src="keeper_dive_r.png"  alt="keeper dive right"/>
            <div id="keeper-fallback">🧤</div>
          </div>

        </div>
      </div>
    </div>
    <canvas id="acvs"></canvas>
    <div id="ball">⚽</div>
    <div id="pw">
      <div id="pw-lbl">파워</div>
      <div id="pw-bar"><div id="pw-fill"></div></div>
    </div>
    <div id="msg">공을 드래그해서 슛!</div>
    <div id="flash"></div>
  </div>
  <div class="ground"><div class="pl"></div><div class="ps"></div></div>
</div>

<div id="s-result"></div>
<div id="cwrap"></div>

<!-- file:// 로 직접 열어도 동작하도록 ES 모듈 대신 compat(전역 스크립트) SDK 사용 -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// ──────────────────────────────────────────────────────────────
// Firebase 설정 — Firebase 콘솔 > 프로젝트 설정 > 내 앱에서 복사한
// firebaseConfig 값을 아래에 그대로 붙여넣으세요.
// ──────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyA38Pg6HTpmrMwvlwTUWfSl5phVnT0iU5w",
  authDomain: "bawoo-keeper-ranking.firebaseapp.com",
  projectId: "bawoo-keeper-ranking",
  storageBucket: "bawoo-keeper-ranking.firebasestorage.app",
  messagingSenderId: "995053711496",
  appId: "1:995053711496:web:14af9dbbee39178764af3d",
  measurementId: "G-SWMYPFS7C1"
};

var db = null;
function initFirebase() {
  if (firebaseConfig.apiKey === "YOUR_API_KEY") {
    console.warn("[랭킹] firebaseConfig가 설정되지 않아 랭킹 기능이 비활성화됩니다.");
    return;
  }
  try {
    var app = firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  } catch (err) {
    console.error("[랭킹] Firebase 초기화 실패", err);
  }
}
initFirebase();

// 동명이인 구분용 기기별 익명 ID (localStorage에 한 번 생성해 재사용)
function getDeviceId() {
  var key = 'bawoo_device_id';
  var id = localStorage.getItem(key);
  if (!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2)));
    localStorage.setItem(key, id);
  }
  return id;
}

async function submitScore(nickname, score, deviceId) {
  if (!db) return;
  try {
    await db.collection("scores").add({
      nickname: nickname,
      score: score,
      deviceId: deviceId,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (err) {
    console.error("[랭킹] 점수 저장 실패", err);
  }
}

async function fetchTopScores(n) {
  if (!db) return [];
  try {
    var snap = await db.collection("scores").orderBy("score", "desc").limit(n).get();
    return snap.docs.map(function(d){ return d.data(); });
  } catch (err) {
    console.error("[랭킹] 상위 점수 조회 실패", err);
    return [];
  }
}

async function fetchMyRank(score) {
  if (!db) return null;
  try {
    var snap = await db.collection("scores").where("score", ">", score).get();
    return snap.size + 1;
  } catch (err) {
    console.error("[랭킹] 내 등수 조회 실패", err);
    return null;
  }
}

// ──────────────────────────────────────────────────────────────
// 게임 로직
// ──────────────────────────────────────────────────────────────
var GAME_SECONDS = 20;
var GOLDEN_CHANCE = 0.05;   // 골든볼 등장 확률
var GOLDEN_POINTS = 5;      // 골든볼 골인 시 점수
var nickname = '';
var myDeviceId = getDeviceId();
var goals = 0, totalScore = 0, kicksTotal = 0, busy = false, phase = 'idle';
var dragOn = false, dSX = 0, dSY = 0, dCX = 0, dCY = 0, rafId = null;
var timeLeft = GAME_SECONDS, timerInt = null, gameOver = false;
var isGolden = false;

var ballEl    = document.getElementById('ball');
var keeperEl  = document.getElementById('keeper');
var flashEl   = document.getElementById('flash');
var msgEl     = document.getElementById('msg');
var pwEl      = document.getElementById('pw');
var pwFill    = document.getElementById('pw-fill');
var acvs      = document.getElementById('acvs');
var actx      = acvs.getContext('2d');
var fieldEl   = document.getElementById('field');
var nickInput = document.getElementById('nick-input');
var btnStart  = document.getElementById('btn-start');
var timerEl   = document.getElementById('hud-timer');

nickInput.addEventListener('input', function(){
  btnStart.disabled = nickInput.value.trim().length === 0;
});
nickInput.addEventListener('keydown', function(e){
  if (e.key === 'Enter' && !btnStart.disabled) startGame();
});

function resizeCvs() {
  acvs.width  = fieldEl.offsetWidth;
  acvs.height = fieldEl.offsetHeight;
}

function startGame() {
  if (nickInput.value.trim().length === 0) return;
  nickname = nickInput.value.trim().slice(0, 10);
  goals = 0; totalScore = 0; kicksTotal = 0; busy = false; phase = 'idle'; gameOver = false;
  timeLeft = GAME_SECONDS;

  document.getElementById('hud-nick').textContent = nickname;
  document.getElementById('s-intro').classList.remove('on');
  document.getElementById('s-result').classList.remove('on');
  document.getElementById('s-game').classList.add('on');
  updateTimerUI();

  setTimeout(function(){ resizeCvs(); resetKick(); startTimer(); }, 80);
}

function startTimer() {
  if (timerInt) clearInterval(timerInt);
  timerInt = setInterval(function(){
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInt);
      timerInt = null;
      endGame();
    }
  }, 1000);
}

function updateTimerUI() {
  timerEl.textContent = Math.max(0, timeLeft);
  timerEl.classList.toggle('warn', timeLeft <= 10);
}

function endGame() {
  gameOver = true;
  // 진행 중인 슛이 끝난 뒤 결과로 넘어가도록 busy 여부 체크
  if (!busy) showTimeOutThenResult();
}

function showTimeOutThenResult() {
  dragOn = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  pwEl.style.opacity = '0'; pwFill.style.width = '0%';
  msgEl.textContent = '';
  flashEl.textContent = '⏰ TIME OUT!';
  flashEl.style.color = '#fff';
  flashEl.style.textShadow = '3px 3px 0 rgba(0,0,0,0.6), 0 0 24px rgba(46,230,176,0.8)';
  flashEl.style.opacity = '1';
  setTimeout(function(){
    flashEl.style.opacity = '0';
    setTimeout(showResult, 250);
  }, 1200);
}

function resetKick() {
  if (gameOver) { showTimeOutThenResult(); return; }
  phase = 'idle'; busy = false; dragOn = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  actx.clearRect(0, 0, acvs.width, acvs.height);

  ballEl.style.cssText =
    'position:absolute;bottom:6%;left:50%;transform:translateX(-50%);' +
    'font-size:42px;cursor:pointer;z-index:10;' +
    'line-height:1;transition:none;opacity:1;' +
    '-webkit-tap-highlight-color:transparent;';

  isGolden = Math.random() < GOLDEN_CHANCE;
  ballEl.classList.toggle('golden', isGolden);
  ballEl.textContent = '⚽';
  fieldEl.classList.toggle('golden-active', isGolden);

  keeperEl.className = '';
  keeperEl.style.cssText = '';
  keeperEl.style.animation = 'sway 2s ease-in-out infinite';
  showKeeperImg('img-center');

  msgEl.textContent = isGolden ? '✨ 골든볼 등장! 지금 넣으면 +' + GOLDEN_POINTS + '점!' : '공을 드래그해서 슛!';
  pwEl.style.opacity = '0';
  pwFill.style.width = '0%';
  flashEl.style.opacity = '0';
  flashEl.textContent = '';

  document.getElementById('sv').textContent = totalScore;
}

// Pointer Events API — mouse/touch/pen 통합, iOS Safari에서 가장 안정적
fieldEl.addEventListener('pointerdown',   onDown, {passive:false});
fieldEl.addEventListener('pointermove',   onMove, {passive:false});
fieldEl.addEventListener('pointerup',     onUp,   {passive:false});
fieldEl.addEventListener('pointercancel', onUp,   {passive:false});

function getPos(e) {
  var r = fieldEl.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function getBallCenter() {
  var fr = fieldEl.getBoundingClientRect();
  var br = ballEl.getBoundingClientRect();
  return { x: br.left - fr.left + br.width/2, y: br.top - fr.top + br.height/2 };
}

function onDown(e) {
  e.preventDefault();
  if (busy || phase !== 'idle' || gameOver) return;
  if (e.pointerId !== undefined) fieldEl.setPointerCapture(e.pointerId);
  var bc = getBallCenter();
  var p  = getPos(e);
  dragOn=true; dSX=bc.x; dSY=bc.y; dCX=p.x; dCY=p.y;
  phase = 'dragging';
  pwEl.style.opacity = '1';
  msgEl.textContent = '손 떼면 슛!';
  if(rafId) cancelAnimationFrame(rafId);
  function loop(){ drawArrow(); rafId=requestAnimationFrame(loop); }
  loop();
}
function onMove(e) {
  e.preventDefault();
  if (!dragOn) return;
  var p = getPos(e); dCX=p.x; dCY=p.y;
}
function onUp(e) {
  e.preventDefault();
  if (!dragOn) return;
  dragOn = false;
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  actx.clearRect(0,0,acvs.width,acvs.height);
  pwEl.style.opacity='0'; pwFill.style.width='0%';
  if (phase !== 'dragging') return;
  var dx=dSX-dCX, dy=dSY-dCY, dist=Math.sqrt(dx*dx+dy*dy);
  if (dist < 12) { phase='idle'; msgEl.textContent='공을 드래그해서 슛!'; return; }
  phase='shooting'; busy=true;
  msgEl.textContent='';
  fireShot(dx, dy, dist);
}

function drawArrow() {
  actx.clearRect(0,0,acvs.width,acvs.height);
  if (!dragOn) return;
  var dx=dSX-dCX, dy=dSY-dCY;
  var raw=Math.sqrt(dx*dx+dy*dy), cap=Math.min(raw,130), pwr=cap/130;
  pwFill.style.width = (pwr*100)+'%';
  if (cap<8) return;
  var ang=Math.atan2(dy,dx);
  var ex=dSX+Math.cos(ang)*cap*.85, ey=dSY+Math.sin(ang)*cap*.85;
  actx.save();
  actx.setLineDash([7,5]);
  actx.strokeStyle='rgba(46,230,176,'+(0.45+pwr*.5)+')';
  actx.lineWidth=2.5;
  actx.beginPath(); actx.moveTo(dSX,dSY); actx.lineTo(ex,ey); actx.stroke();
  actx.setLineDash([]);
  actx.save(); actx.translate(ex,ey); actx.rotate(ang);
  actx.beginPath(); actx.moveTo(11,0); actx.lineTo(-6,6); actx.lineTo(-6,-6); actx.closePath();
  actx.fillStyle='rgba(46,230,176,'+(0.55+pwr*.45)+')';
  actx.fill(); actx.restore(); actx.restore();
}

function fireShot(dx, dy, dist) {
  var pwr = Math.min(dist/130, 1);
  var ndx = dx/dist, ndy = dy/dist;
  var gf  = document.getElementById('goal-inner');
  var fr  = fieldEl.getBoundingClientRect();
  var gr  = gf.getBoundingClientRect();
  var gL = gr.left-fr.left, gT = gr.top-fr.top, gW = gr.width, gH = gr.height;
  var fW = fr.width, fH = fr.height;

  // 빠른 템포: 고파워 0.12s, 저파워 0.34s
  var tY = gT + gH * 0.30;
  var dur = (0.12 + (1-pwr)*0.22).toFixed(2);

  if (ndy >= -0.08) {
    var oX = dSX + ndx * fW * 0.4;
    var oY = dSY + ndy * fH * 0.4;
    ballEl.style.transition = 'left '+dur+'s ease-out,bottom '+dur+'s ease-out,opacity '+dur+'s,transform '+dur+'s';
    requestAnimationFrame(function(){
      ballEl.style.left      = (oX/fW*100)+'%';
      ballEl.style.bottom    = ((fH-oY-20)/fH*100)+'%';
      ballEl.style.opacity   = '0';
      ballEl.style.transform = 'translateX(-50%) scale(0.7)';
    });
    setTimeout(function(){ kickResult(false); }, dur*1000+50);
    return;
  }

  var t  = (tY - dSY) / ndy;
  var tX = dSX + ndx * t;

  var postL = gL + gW*0.05;
  var postR = gL + gW*0.95;
  if (tX < postL || tX > postR) {
    var endL2 = (tX/fW*100)+'%';
    var endB2 = ((fH-tY-20)/fH*100)+'%';
    ballEl.style.transition = 'left '+dur+'s cubic-bezier(.2,.8,.3,1),bottom '+dur+'s cubic-bezier(.2,.8,.3,1),transform '+dur+'s,opacity '+dur+'s';
    requestAnimationFrame(function(){
      ballEl.style.left      = endL2;
      ballEl.style.bottom    = endB2;
      ballEl.style.transform = 'translateX(-50%) scale(0.5)';
      ballEl.style.opacity   = '0.2';
    });
    setTimeout(function(){ kickResult(false); }, dur*1000+50);
    return;
  }

  var rel  = (tX - gL) / gW;
  var side = rel - 0.5;
  var kd   = keeperAI(side, pwr);
  var isGoal = checkGoal(rel, kd, pwr);

  var keeperTargetRel = isGoal
    ? (kd==='left' ? 0.14 : kd==='right' ? 0.86 : 0.50)
    : rel;

  var imgDir = isGoal ? kd
    : (rel < 0.35 ? 'left' : rel > 0.65 ? 'right' : 'center');

  setTimeout(function(){ moveKeeperTo(imgDir, keeperTargetRel); }, 70);

  var endL = (tX/fW*100)+'%';
  var endB = ((fH-tY-20)/fH*100)+'%';
  ballEl.style.transition = 'left '+dur+'s cubic-bezier(.2,.8,.3,1),bottom '+dur+'s cubic-bezier(.2,.8,.3,1),transform '+dur+'s,opacity '+dur+'s';
  requestAnimationFrame(function(){
    ballEl.style.left      = endL;
    ballEl.style.bottom    = endB;
    ballEl.style.transform = 'translateX(-50%) scale('+(0.45+pwr*0.15)+')';
    if (!isGoal) ballEl.style.opacity = '0.4';
  });
  setTimeout(function(){ kickResult(isGoal); }, dur*1000+50);
}

// AI: 파워 낮을수록 키퍼가 방향을 정확히 읽음 (반응시간 충분)
// 파워 높을수록 키퍼가 찍기에 가까워짐 (공이 너무 빠름)
// 전체 평균 세이브율 약 62%가 되도록 보정된 수치 (시뮬레이션 기반)
function keeperAI(side, pwr) {
  var r = Math.random();
  var ok = Math.abs(side) < 0.18 ? 'center' : (side < 0 ? 'left' : 'right');
  var correctChance = 0.84 - pwr * 0.50;
  if (r < correctChance) return ok;
  var wrongs = ['left','center','right'].filter(function(d){ return d !== ok; });
  return wrongs[Math.floor(Math.random() * 2)];
}

// 골 판정: 저파워일수록 키퍼 세이브 범위가 넓어짐
function checkGoal(rel, kd, pwr) {
  var m = 0.30 + (1 - pwr) * 0.18;
  if (kd === 'left'   && rel < m)            return false;
  if (kd === 'right'  && rel > 1 - m)        return false;
  if (kd === 'center' && rel >= 0.5-m*0.55 && rel <= 0.5+m*0.55) return false;
  return true;
}

// 키퍼 이미지 로딩 실패 시 자동 재시도 후, 그래도 실패하면 이모지로 대체
var KEEPER_IMG_IDS = ['img-center', 'img-dive-l', 'img-dive-r'];
KEEPER_IMG_IDS.forEach(function(id){
  var img = document.getElementById(id);
  img.dataset.retries = '0';
  img.addEventListener('error', function(){
    var retries = parseInt(img.dataset.retries || '0', 10);
    var baseSrc = img.src.split('?')[0];
    if (retries < 2) {
      img.dataset.retries = String(retries + 1);
      setTimeout(function(){ img.src = baseSrc + '?r=' + Date.now(); }, 500);
    } else {
      img.classList.add('img-broken');
      if (img.style.display !== 'none') showKeeperImg(id);
    }
  });
});
// 게임 시작 전(인트로 화면)부터 미리 캐시에 로드해 두어 다이브 순간 끊김/누락 방지
KEEPER_IMG_IDS.forEach(function(id){
  var src = document.getElementById(id).getAttribute('src');
  var pre = new Image();
  pre.src = src;
});

function showKeeperImg(id) {
  var broken = document.getElementById(id).classList.contains('img-broken');
  KEEPER_IMG_IDS.forEach(function(n){
    document.getElementById(n).style.display = (n===id && !broken) ? 'block' : 'none';
  });
  document.getElementById('keeper-fallback').style.display = broken ? 'flex' : 'none';
}

function moveKeeperTo(d, rel) {
  keeperEl.style.animation = 'none';
  keeperEl.className = d==='left'?'dl':d==='right'?'dr':'dc';

  var kw = 22;
  var leftPct = Math.max(0, Math.min(100-kw, rel*100 - kw/2));
  keeperEl.style.left      = leftPct+'%';
  keeperEl.style.transform = 'none';
  keeperEl.style.width     = kw+'%';
  keeperEl.style.bottom    = '0';

  showKeeperImg(d==='left'?'img-dive-l':d==='right'?'img-dive-r':'img-center');
}

function kickResult(isGoal) {
  if (isGoal) {
    goals++;
    totalScore += isGolden ? GOLDEN_POINTS : 1;
  }
  kicksTotal++;

  if (isGoal && isGolden) {
    flashEl.textContent = '✨ 골든볼! +' + GOLDEN_POINTS;
    flashEl.style.color = '#ffd700';
    flashEl.style.textShadow = '3px 3px 0 rgba(0,0,0,0.6), 0 0 24px rgba(255,215,0,0.9)';
  } else if (isGoal) {
    flashEl.textContent = '⚽ 골인! +1';
    flashEl.style.color = '#fff';
    flashEl.style.textShadow = '3px 3px 0 rgba(0,0,0,0.6), 0 0 20px rgba(46,230,176,0.7)';
  } else {
    flashEl.textContent = '🧤 노 골';
    flashEl.style.color = '#ff6b6b';
    flashEl.style.textShadow = '3px 3px 0 rgba(0,0,0,0.6)';
  }
  flashEl.style.opacity = '1';
  document.getElementById('sv').textContent = totalScore;

  setTimeout(function(){
    flashEl.style.opacity = '0';
    busy = false;
    if (gameOver) { showTimeOutThenResult(); }
    else resetKick();
  }, 480);
}

async function showResult() {
  if (timerInt) { clearInterval(timerInt); timerInt = null; }
  fieldEl.classList.remove('golden-active');
  ballEl.classList.remove('golden');
  var r = document.getElementById('s-result');
  r.innerHTML =
    '<div class="ri">🏆</div>' +
    '<div class="rt">' + nickname + '님, 수고하셨어요!</div>' +
    '<div class="rs">' + totalScore + '점</div>' +
    '<div class="rsub">' + GAME_SECONDS + '초 동안 ' + kicksTotal + '번 슛 / ' + goals + '번 성공<br>바우키퍼를 뚫어낸 골든볼!</div>' +
    '<div class="rank-box" id="rank-box"><div class="rank-title">🏆 전체 랭킹 TOP 10</div><div id="rank-list" class="rank-empty">불러오는 중...</div></div>' +
    '<div class="btn-row">' +
      '<button class="btn-mint" onclick="window.__startGame()">다시 도전</button>' +
      '<button class="btn2" id="btn-save-card" disabled>랭킹 카드 저장</button>' +
    '</div>';
  document.getElementById('s-game').classList.remove('on');
  r.classList.add('on');
  if (totalScore >= 5) confetti();

  await submitScore(nickname, totalScore, myDeviceId);
  var topScoresCache = await fetchTopScores(10);
  var myRankCache = await fetchMyRank(totalScore);

  // 방금 저장한 점수가 쓰기/읽기 시점 차이로 TOP10 조회에 아직 반영되지 않았을 수 있으므로,
  // 내 등수가 10위 이내인데 목록에 없으면 직접 끼워넣어 등수와 목록을 일치시킨다.
  var alreadyInTop = topScoresCache.some(function(r){ return r.deviceId === myDeviceId; });
  if (myRankCache && myRankCache <= 10 && !alreadyInTop) {
    topScoresCache.splice(myRankCache - 1, 0, { nickname: nickname, score: totalScore, deviceId: myDeviceId });
    topScoresCache = topScoresCache.slice(0, 10);
  }

  renderRankList(topScoresCache, myRankCache);

  var saveBtn = document.getElementById('btn-save-card');
  if (saveBtn) {
    saveBtn.disabled = false;
    saveBtn.onclick = function(){ saveRankCard(myRankCache, topScoresCache); };
  }
}

function renderRankList(top, myRank) {
  var list = document.getElementById('rank-list');
  if (!list) return;
  if (!top || top.length === 0) {
    list.className = 'rank-empty';
    list.textContent = '랭킹 정보를 불러올 수 없어요';
    return;
  }
  list.className = '';
  var html = '';
  var meInTop = false;
  top.forEach(function(row, i){
    var isMe = row.deviceId === myDeviceId;
    if (isMe) meInTop = true;
    html += '<div class="rank-row' + (isMe?' me':'') + '">' +
      '<div class="rank-rank">' + (i+1) + '</div>' +
      '<div class="rank-name">' + escapeHtml(row.nickname) + '</div>' +
      '<div class="rank-score">' + row.score + '점</div>' +
      '</div>';
  });
  if (!meInTop && myRank) {
    html += '<div class="rank-myrow-sep">⋯</div>';
    html += '<div class="rank-row me">' +
      '<div class="rank-rank">' + myRank + '</div>' +
      '<div class="rank-name">' + escapeHtml(nickname) + '</div>' +
      '<div class="rank-score">' + totalScore + '점</div>' +
      '</div>';
  }
  list.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}

function saveRankCard(myRank, top) {
  var W = 720, H = 1000;
  var c = document.createElement('canvas');
  c.width = W; c.height = H;
  var ctx = c.getContext('2d');

  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0c2f28');
  g.addColorStop(1, '#071512');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#2EE6B0';
  ctx.font = '900 40px sans-serif';
  ctx.fillText('⚽ 골든볼 미니게임', W/2, 90);

  ctx.fillStyle = '#9be8cf';
  ctx.font = '700 20px sans-serif';
  ctx.fillText('바우키퍼 챌린지 결과', W/2, 130);

  ctx.fillStyle = '#fff';
  ctx.font = '900 46px sans-serif';
  ctx.fillText(nickname, W/2, 230);

  ctx.fillStyle = '#2EE6B0';
  ctx.font = '900 120px sans-serif';
  ctx.fillText(totalScore + '점', W/2, 360);

  if (myRank) {
    ctx.fillStyle = '#fff';
    ctx.font = '800 28px sans-serif';
    ctx.fillText('전체 ' + myRank + '위', W/2, 410);
  }

  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(60, 450, W-120, 2);

  ctx.fillStyle = '#2EE6B0';
  ctx.font = '900 24px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('TOP 10', 60, 500);

  var startY = 545;
  if (top && top.length) {
    top.slice(0, 10).forEach(function(row, i){
      var y = startY + i*42;
      var isMe = row.deviceId === myDeviceId;
      ctx.fillStyle = isMe ? 'rgba(46,230,176,0.18)' : 'transparent';
      if (isMe) ctx.fillRect(50, y-28, W-100, 38);
      ctx.fillStyle = isMe ? '#2EE6B0' : '#fff';
      ctx.font = (isMe ? '900' : '700') + ' 22px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText((i+1) + '.', 60, y);
      ctx.fillText(row.nickname, 110, y);
      ctx.textAlign = 'right';
      ctx.fillText(row.score + '점', W-60, y);
      ctx.textAlign = 'left';
    });
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '600 18px sans-serif';
    ctx.fillText('랭킹 정보 없음', 60, startY);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '600 14px sans-serif';
  ctx.fillText(new Date().toLocaleDateString('ko-KR'), W/2, H-30);

  c.toBlob(function(blob){
    var filename = '골든볼_' + nickname + '_' + totalScore + '점.png';
    var file = new File([blob], filename, { type: 'image/png' });

    // 모바일: 공유 시트를 통해 "이미지 저장"으로 사진 앱(카메라 롤)에 바로 저장 가능
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: '골든볼 미니게임' }).catch(function(){
        // 사용자가 취소했거나 공유 실패 시 다운로드 방식으로 대체
        downloadBlob(blob, filename);
      });
      return;
    }
    // 데스크톱 등 미지원 환경: 파일 다운로드
    downloadBlob(blob, filename);
  });
}

function downloadBlob(blob, filename) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

function confetti() {
  var w=document.getElementById('cwrap'); w.innerHTML='';
  var cols=['#2EE6B0','#14B894','#fff','#f5e018','#4fc3f7'];
  for(var i=0;i<70;i++){
    var c=document.createElement('div'); c.className='c';
    c.style.cssText='left:'+Math.random()*100+'vw;width:'+(8+Math.random()*8)+'px;height:'+(10+Math.random()*10)+'px;background:'+cols[i%5]+';animation-duration:'+(1.5+Math.random()*2)+'s;animation-delay:'+(Math.random()*.8)+'s;';
    w.appendChild(c);
  }
  setTimeout(function(){ w.innerHTML=''; },3800);
}

window.addEventListener('resize', function(){
  if(document.getElementById('s-game').classList.contains('on')) resizeCvs();
});

window.startGame = startGame;
window.__startGame = function(){
  document.getElementById('s-result').classList.remove('on');
  document.getElementById('s-intro').classList.add('on');
  nickInput.value = nickname;
  btnStart.disabled = false;
};
